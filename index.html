<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DDM Lavarone 2026 🎿</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f1e;
  font-family:'Arial Black',Arial,sans-serif;touch-action:none;
  user-select:none;-webkit-user-select:none;}
canvas{display:block;position:fixed;inset:0;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:20;padding:20px;
  background:radial-gradient(ellipse at 50% 30%,#071428,#020810);}
.screen.hidden{display:none;}

.logo{font-size:clamp(44px,12vw,88px);font-weight:900;letter-spacing:6px;
  background:linear-gradient(135deg,#fff 0%,#88ccff 50%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:.9;}
.subtitle{font-size:clamp(13px,3.5vw,22px);letter-spacing:8px;color:#2a5fff;
  margin-bottom:28px;margin-top:4px;}
.desc{font-size:12px;color:rgba(255,255,255,.35);line-height:2;
  margin-bottom:22px;text-align:center;}
.btn{padding:14px 44px;border-radius:50px;border:2px solid #2a5fff;
  background:linear-gradient(135deg,rgba(26,75,204,.35),rgba(0,200,255,.1));
  color:#fff;font-size:17px;font-weight:900;letter-spacing:5px;cursor:pointer;}
.btn:active{transform:scale(.95);}
.nick-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:10px 16px;}
.nick-row label{font-size:11px;letter-spacing:3px;color:rgba(80,140,255,.7);}
#nickInput{background:none;border:none;outline:none;color:#fff;
  font-size:17px;font-weight:700;width:150px;text-align:center;font-family:inherit;}
#nickInput::placeholder{color:rgba(255,255,255,.18);}
.lbtitle{font-size:9px;letter-spacing:4px;color:rgba(80,140,255,.4);
  text-transform:uppercase;margin:16px 0 8px;}
.lbrow{display:flex;justify-content:space-between;gap:12px;
  padding:5px 10px;border-radius:6px;font-size:13px;margin-bottom:2px;
  width:100%;max-width:300px;}
.lbrow:nth-child(1){background:rgba(255,215,0,.08);color:#ffd700;}
.lbrow:nth-child(2){background:rgba(192,192,192,.06);color:#c0c0c0;}
.lbrow:nth-child(3){background:rgba(205,127,50,.06);color:#cd7f32;}
.lbpts{font-weight:900;color:#ffd84d;}
.lbtime{font-family:monospace;color:rgba(255,255,255,.35);font-size:11px;}

#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;
  display:flex;justify-content:space-around;align-items:flex-start;
  padding:8px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);}
.hl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;}
.hv{font-size:20px;font-weight:900;color:#fff;text-shadow:0 0 10px rgba(80,180,255,.5);}

#flash{position:fixed;inset:0;pointer-events:none;z-index:8;opacity:0;}
#flash.g{animation:fg .3s ease-out forwards;}
#flash.r{animation:fr .35s ease-out forwards;}
@keyframes fg{0%{background:rgba(0,255,100,.2);opacity:1}100%{opacity:0}}
@keyframes fr{0%{background:rgba(255,30,50,.25);opacity:1}100%{opacity:0}}

#fb{position:fixed;top:18%;left:50%;transform:translateX(-50%);
  font-size:26px;font-weight:900;letter-spacing:3px;
  pointer-events:none;opacity:0;white-space:nowrap;z-index:15;}
#fb.pop{animation:pop .8s ease-out forwards;}
@keyframes pop{0%{opacity:1;transform:translateX(-50%) scale(1.3)}
  100%{opacity:0;transform:translateX(-50%) scale(.85) translateY(-28px)}}

#memoryScreen{position:fixed;inset:0;z-index:30;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;transition:opacity .5s;touch-action:none;}
#memoryScreen.show{opacity:1;}
#memoryScreen.hidden{display:none;}

#memoryGallery{position:relative;width:100%;flex:1;overflow:hidden;display:flex;align-items:center;}
#memoryTrack{display:flex;align-items:center;height:100%;transition:transform .35s ease;will-change:transform;}
#memoryTrack img{flex-shrink:0;width:100vw;height:100%;object-fit:contain;padding:0 6px;}

#memoryTop{width:100%;padding:10px 16px 6px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
#memoryScore{font-size:28px;font-weight:900;color:#ffd84d;text-shadow:0 0 20px #ffd84d88;}
#memorySub{font-size:11px;color:rgba(255,255,255,.35);}

#memoryBottom{width:100%;padding:8px 16px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;}
#memoryCounter{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:2px;}
#memoryDots{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;max-width:280px;}
.mdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .2s;}
.mdot.active{background:#ffd84d;}
#memoryBtn{padding:10px 32px;border-radius:40px;
  border:2px solid #22dd88;background:transparent;color:#22dd88;
  font-size:14px;font-weight:900;letter-spacing:4px;cursor:pointer;}
</style>

// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let actx=null;
function AC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
let snode=null,sgain=null;
function audioStart(){
  if(snode)return;const a=AC();
  const b=a.createBuffer(1,a.sampleRate*2,a.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  snode=a.createBufferSource();snode.buffer=b;snode.loop=true;
  const bp=a.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=.9;
  sgain=a.createGain();sgain.gain.value=0;
  snode.connect(bp);bp.connect(sgain);sgain.connect(a.destination);snode.start();
}
function audioStop(){if(!snode)return;try{snode.stop();}catch(e){}snode=null;sgain=null;}
function audioSetSpeed(v){if(!sgain||!actx)return;sgain.gain.setTargetAtTime(v*.14,actx.currentTime,.1);}
function beep(ff,amp=.22){const a=AC(),t=a.currentTime;ff.forEach((f,i)=>{const o=a.createOscillator();o.type='sine';o.frequency.value=f;const g=a.createGain();g.gain.setValueAtTime(amp,t+i*.07);g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.5);o.connect(g);g.connect(a.destination);o.start(t+i*.07);o.stop(t+i*.07+.55);});}
function crashSound(){const a=AC(),t=a.currentTime;const o=a.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(110,t);o.frequency.exponentialRampToValueAtTime(30,t+.8);const g=a.createGain();g.gain.setValueAtTime(.45,t);g.gain.exponentialRampToValueAtTime(.001,t+.85);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.9);}

// ══════════════════════════════════════════
const SLOPE_W  = ()=>Math.min(W*.92,460);
const GAME_H   = ()=>H*.825;          // game area top 82.5%, touchpad = 17.5%
const SKIER_Y  = ()=>GAME_H()*.80;    // lyžař v 80% herní plochy
const GATE_H   = 44;
const GATE_SPACING = 420;

function pX(frac){return W/2+frac*(SLOPE_W()/2);}
function worldToScreen(worldY){return SKIER_Y()-(worldY-G.scrollY);}

const G={state:'menu',x:0,scrollY:0,speed:0,elapsed:0,score:0,gates:0,missed:0,level:1,timing:false,lean:0,_prevX:0};
let gates=[];
let nextGateY=0;
let photoRound=0;
function nextPhotoUrl(){const id=shuffled[photoRound%shuffled.length];photoRound++;return`https://lh3.googleusercontent.com/pw/${id}=w720-k-no`;}

// ══════════════════════════════════════════
// GATES — no banners, no obstacles
// ══════════════════════════════════════════
function makeGate(worldY){
  const diff=Math.min(10,G.gates/8);
  const off=(Math.random()-.5)*1.2;
  const r=Math.random();
  let half,pts,type;
  if(r<.22){
    // narrow — minimum half=0.20 (was 0.08, much wider now)
    half=Math.max(0.20,0.22+Math.random()*.06-diff*.008);
    pts=3;type='narrow';
  } else if(r<.55){
    half=Math.max(0.26,0.28+Math.random()*.08-diff*.008);
    pts=2;type='medium';
  } else {
    half=Math.max(0.32,0.34+Math.random()*.10-diff*.008);
    pts=1;type='wide';
  }
  return{worldY,off,half,pts,type,passed:false,missed:false};
}

function spawnGates(){
  const diff=Math.min(10,G.gates/8);
  const spacing=Math.max(280,GATE_SPACING-diff*10);
  while(nextGateY<G.scrollY+GAME_H()*1.5){
    gates.push(makeGate(nextGateY));
    nextGateY+=spacing+(Math.random()*50-25);
  }
  const cutoff=G.scrollY-GAME_H()*.3;
  gates=gates.filter(g=>g.worldY>cutoff);
}

// ══════════════════════════════════════════
// DRAWING — slope = tiled photos
// ══════════════════════════════════════════
function drawSlopeBackground(){
  const sw=SLOPE_W(), gh=GAME_H();
  const lx=(W-sw)/2;
  const FRAME=5;
  const defaultH=Math.round(sw*0.67);

  function imgH(img){
    return(img.complete&&img.naturalWidth>0)
      ? Math.round(sw*img.naturalHeight/img.naturalWidth)
      : defaultH;
  }

  // Celková výška všech fotek za sebou
  const heights=slopeImgs.map(imgH);
  const totalH=heights.reduce((a,b)=>a+b,0)||1;

  // scrollY roste → fotky jedou DOLŮ (nová fotka přichází shora)
  // Offset v rámci celkové výšky (scrollY mod totalH)
  const scrollMod=G.scrollY%totalH;

  // Najdi první fotku: která fotka obsahuje scrollMod
  let cumBefore=0, firstI=0;
  let running=0;
  for(let i=0;i<heights.length;i++){
    if(running+heights[i]>scrollMod){firstI=i;cumBefore=running;break;}
    running+=heights[i];
  }

  // Y pozice horního okraje první fotky na obrazovce
  // scrollMod je "kolik scrollY jsme do první fotky" → fotka začíná výše o ten rozdíl
  let y=cumBefore-scrollMod; // ≤ 0 (první fotka je částečně nahoře)

  // Kresli fotky dolů dokud nezaplníme gh
  let idx=firstI;
  for(let n=0;n<slopeImgs.length+2;n++){
    if(y>gh+FRAME) break;
    const img=slopeImgs[idx];
    const h=heights[idx];
    ctx.fillStyle='#000';
    ctx.fillRect(lx-FRAME, y-FRAME, sw+FRAME*2, h+FRAME*2);
    if(img.complete&&img.naturalWidth>0){
      ctx.drawImage(img, lx, y, sw, h);
    } else {
      ctx.fillStyle=`hsl(${(idx*37)%360},40%,75%)`;
      ctx.fillRect(lx, y, sw, h);
    }
    y+=h;
    idx=(idx+1)%slopeImgs.length;
  }

  // Subtle overlay to keep gates readable
  const overlay=ctx.createLinearGradient(lx,0,lx+sw,0);
  overlay.addColorStop(0,'rgba(200,220,255,.18)');
  overlay.addColorStop(.5,'rgba(200,220,255,.04)');
  overlay.addColorStop(1,'rgba(200,220,255,.18)');
  ctx.fillStyle=overlay;
  ctx.fillRect(lx,0,sw,gh);

  // Blue lane edge lines
  ctx.strokeStyle='rgba(0,80,220,.6)';ctx.lineWidth=3;ctx.setLineDash([18,10]);
  ctx.beginPath();ctx.moveTo(lx+10,0);ctx.lineTo(lx+10,gh);ctx.stroke();
  ctx.beginPath();ctx.moveTo(lx+sw-10,0);ctx.lineTo(lx+sw-10,gh);ctx.stroke();
  ctx.setLineDash([]);

  // Dark forest sides
  ctx.fillStyle='rgba(10,25,10,.88)';
  ctx.fillRect(0,0,lx,gh);
  ctx.fillRect(lx+sw,0,W-lx-sw,gh);

  // Trees
  ctx.fillStyle='#1a5028';
  const ts=56,tOff=(G.scrollY*.4)%ts;
  for(let ty=tOff-ts;ty<gh+ts;ty+=ts){
    drawTree(lx*.5,ty,16+((ty*7)%10));
    drawTree(lx*.5+12,ty+26,12+((ty*3)%8));
    drawTree(lx+sw+(W-lx-sw)*.5+8,ty+12,16+((ty*5)%10));
    drawTree(lx+sw+(W-lx-sw)*.5-10,ty+34,13+((ty*9)%8));
  }
}

function drawTree(x,y,size){
  ctx.beginPath();ctx.moveTo(x,y-size);ctx.lineTo(x+size*.6,y+size*.3);ctx.lineTo(x-size*.6,y+size*.3);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y-size*.5);ctx.lineTo(x+size*.45,y+size*.65);ctx.lineTo(x-size*.45,y+size*.65);ctx.closePath();ctx.fill();
}

function drawGate(g){
  const sy=worldToScreen(g.worldY);
  if(sy<-80||sy>GAME_H()+60)return;
  const sw=SLOPE_W();
  const cx=pX(g.off);
  const hw=g.half*(sw/2);
  const lx=cx-hw,rx=cx+hw;
  const col=g.type==='narrow'?'#dd00ff':g.type==='medium'?'#ff5500':(gates.indexOf(g)%2===0?'#ff0022':'#0055ff');

  // Glow
  if(g.type==='narrow'){ctx.shadowBlur=16;ctx.shadowColor='#cc00ff88';}

  // Poles
  ctx.fillStyle=col;
  ctx.fillRect(lx-5,sy-GATE_H,10,GATE_H);
  ctx.fillRect(rx-5,sy-GATE_H,10,GATE_H);

  // Arch
  ctx.beginPath();ctx.arc(cx,sy-GATE_H,hw,Math.PI,0,false);
  ctx.strokeStyle=col;ctx.lineWidth=8;ctx.stroke();

  // Ground discs
  ctx.fillStyle=col+'bb';
  ctx.beginPath();ctx.ellipse(lx,sy,7,3,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(rx,sy,7,3,0,0,Math.PI*2);ctx.fill();

  // Points
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,.95)';ctx.font='bold 12px Arial';ctx.textAlign='center';
  ctx.fillText(`+${g.pts}`,cx,sy-GATE_H-8);
}

function drawSkier(){
  const sx=pX(G.x), sy=SKIER_Y();
  const lean=Math.max(-.4,Math.min(.4,G.lean||0));

  ctx.save();ctx.translate(sx,sy);ctx.rotate(lean);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.25)';
  ctx.beginPath();ctx.ellipse(0,8,14,5,0,0,Math.PI*2);ctx.fill();

  // Skis
  ctx.fillStyle='#1044ff';ctx.fillRect(-16,-2,14,6);ctx.fillRect(2,-2,14,6);
  ctx.fillStyle='#ff1000';ctx.fillRect(-15,-3,4,8);ctx.fillRect(11,-3,4,8);

  // Body
  ctx.fillStyle='#0a1faa';ctx.fillRect(-9,-28,18,22);
  ctx.fillStyle='#ff1e00';ctx.fillRect(-9,-26,18,4);ctx.fillRect(-9,-18,18,4);

  // Helmet
  ctx.fillStyle='#cc1500';
  ctx.beginPath();ctx.arc(0,-34,11,Math.PI,0,false);ctx.fillRect(-11,-34,22,6);ctx.fill();

  // Goggles
  ctx.fillStyle='#ffcc00';ctx.fillRect(-9,-36,18,5);
  ctx.fillStyle='rgba(100,180,255,.7)';ctx.fillRect(-7,-36,16,4);

  // Face
  ctx.fillStyle='#eec080';ctx.beginPath();ctx.arc(0,-40,6,0,Math.PI*2);ctx.fill();

  // Poles
  ctx.strokeStyle='#aaa';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-11,-20);ctx.lineTo(-22,8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(11,-20);ctx.lineTo(22,8);ctx.stroke();
  ctx.fillStyle='#555';
  ctx.beginPath();ctx.arc(-22,8,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(22,8,4,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

function drawTouchpad(){
  const gh=GAME_H(), tph=H-gh;
  ctx.fillStyle='#0d1422';ctx.fillRect(0,gh,W,tph);

  const sw=SLOPE_W(), tpy=gh+tph*.5;
  const tpw=sw*.88, tphh=tph*.5;
  ctx.strokeStyle='rgba(26,90,220,.3)';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(W/2-tpw/2,tpy-tphh/2,tpw,tphh,14);ctx.stroke();

  // Dot at skier X
  const dotX=pX(G.x);
  ctx.fillStyle='rgba(26,90,255,.4)';ctx.beginPath();ctx.arc(dotX,tpy,18,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.arc(dotX,tpy,9,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='rgba(255,255,255,.16)';ctx.font='11px Arial';ctx.textAlign='center';
  ctx.fillText('◀  táhni prstem  ▶',W/2,gh+tph*.88);
}

function drawArrow(){
  const ng=gates.find(g=>!g.passed&&!g.missed&&worldToScreen(g.worldY)<SKIER_Y()-20);
  if(!ng)return;
  const dx=pX(ng.off)-pX(G.x);
  if(Math.abs(dx)<30)return;
  ctx.fillStyle='rgba(255,200,0,.85)';ctx.font='bold 24px Arial';ctx.textAlign='center';
  ctx.fillText(dx>0?'→':'←',W/2+(dx>0?70:-70),SKIER_Y()-60);
}

// ══════════════════════════════════════════
// HUD
// ══════════════════════════════════════════
const hT=document.getElementById('hT'),hG=document.getElementById('hG'),
      hS=document.getElementById('hS'),hL=document.getElementById('hL'),
      flashEl=document.getElementById('flash'),fbEl=document.getElementById('fb');
let fbTmr=null;
function doFlash(t){flashEl.className='';void flashEl.offsetWidth;flashEl.className=t;}
function showFB(txt,col){fbEl.textContent=txt;fbEl.style.color=col;fbEl.className='';void fbEl.offsetWidth;fbEl.className='pop';if(fbTmr)clearTimeout(fbTmr);fbTmr=setTimeout(()=>fbEl.className='',900);}
function updateHUD(){hT.textContent=G.elapsed.toFixed(1);hG.textContent=G.gates;hS.textContent=G.score;hL.textContent=G.level;}

// ══════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════
let tX=null,mdrag=false,mX=0;
function screenToX(sx){return Math.max(-1,Math.min(1,(sx-W/2)/(SLOPE_W()/2)));}
canvas.addEventListener('touchstart',e=>{if(G.state!=='running')return;tX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchmove', e=>{if(G.state!=='running')return;tX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchend',  ()=>{tX=null;});
canvas.addEventListener('mousedown', e=>{if(G.state!=='running')return;mdrag=true;mX=e.clientX;});
window.addEventListener('mousemove', e=>{if(!mdrag||G.state!=='running')return;mX=e.clientX;});
window.addEventListener('mouseup',   ()=>mdrag=false);
const keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',  e=>keys[e.key]=false);

// ══════════════════════════════════════════
// TICK
// ══════════════════════════════════════════
function tick(dt){
  // Position
  if(tX!==null)       G.x+=(screenToX(tX)-G.x)*Math.min(1,dt*18);
  else if(mdrag)       G.x+=(screenToX(mX)-G.x)*Math.min(1,dt*18);
  else if(keys['ArrowLeft']||keys['a'])  G.x=Math.max(-1,G.x-dt*2.5);
  else if(keys['ArrowRight']||keys['d']) G.x=Math.min(1,G.x+dt*2.5);
  G.x=Math.max(-1,Math.min(1,G.x));

  // Lean
  G.lean=G.lean||0;G._prevX=G._prevX||G.x;
  G.lean+=((G.x-G._prevX)/Math.max(dt,.001)*.35-G.lean)*Math.min(1,dt*10);
  G._prevX=G.x;

  // Physics
  const diff=Math.min(10,G.gates/8);
  const maxSpd=300+diff*28;
  G.speed+=(180+diff*14)*dt;G.speed=Math.min(maxSpd,G.speed);
  G.scrollY+=G.speed*dt;
  if(!G.timing&&G.scrollY>50)G.timing=true;
  if(G.timing)G.elapsed+=dt;
  G.level=1+Math.floor(diff);
  audioSetSpeed(G.speed/maxSpd);
  spawnGates();

  // Gate check
  for(const g of gates){
    if(g.passed||g.missed)continue;
    const sy=worldToScreen(g.worldY);
    if(sy>SKIER_Y()-10&&sy<SKIER_Y()+30){
      if(G.x>g.off-g.half&&G.x<g.off+g.half){
        g.passed=true;G.gates++;G.score+=g.pts;doFlash('g');
        const c=Math.abs(G.x-g.off)/g.half;
        let txt,col,bonus=0;
        if(c<.2){txt=`PERFECT! +${g.pts+1}⭐`;col='#00eeff';bonus=1;}
        else if(c<.55){txt=`GOOD +${g.pts}✓`;col='#ffdd00';}
        else{txt=`OK +${g.pts}`;col='#88ff88';}
        G.score+=bonus;showFB(txt,col);beep(c<.2?[1046,1318,1568]:[880,1100]);
      } else {
        g.missed=true;G.missed++;doFlash('r');showFB('MISS! 🚩','#ff4444');
        if(G.missed>=2){die('2× vynechaná branka');return;}
      }
    }
  }
  updateHUD();
}

// ══════════════════════════════════════════
// DEATH + MEMORY
// ══════════════════════════════════════════
function die(reason){
  if(G.state==='dead')return;
  G.state='dead';audioStop();crashSound();doFlash('r');
  if(G.score>0)lbAdd(playerNick||'Závodník',G.score,G.elapsed);
  setTimeout(()=>showMemory(reason),800);
}
// ══════════════════════════════════════════
// MEMORY GALLERY — swipeable, all photos
// ══════════════════════════════════════════
let memIdx=0;

function buildGallery(){
  const track=document.getElementById('memoryTrack');
  const dots=document.getElementById('memoryDots');
  track.innerHTML='';dots.innerHTML='';
  // Load all photos into track
  shuffled.forEach((pid,i)=>{
    const img=new Image();
    img.src=`https://lh3.googleusercontent.com/pw/${pid}=w720-k-no`;
    img.style.cssText='flex-shrink:0;width:100vw;height:100%;object-fit:contain;padding:0 8px;';
    track.appendChild(img);
    const dot=document.createElement('div');
    dot.className='mdot'+(i===0?' active':'');
    dot.addEventListener('click',()=>goTo(i));
    dots.appendChild(dot);
  });
}

function goTo(i){
  memIdx=Math.max(0,Math.min(shuffled.length-1,i));
  document.getElementById('memoryTrack').style.transform=`translateX(-${memIdx*100}vw)`;
  document.getElementById('memoryCounter').textContent=`${memIdx+1} / ${shuffled.length}`;
  document.querySelectorAll('.mdot').forEach((d,j)=>d.classList.toggle('active',j===memIdx));
}

function showMemory(reason){
  G.state='memory';
  buildGallery();
  // Start on a random photo
  memIdx=Math.floor(Math.random()*shuffled.length);
  document.getElementById('memoryScore').textContent=`${G.score} bodů`;
  document.getElementById('memorySub').textContent=reason?`💥 ${reason}`:`Brány: ${G.gates} • ${G.elapsed.toFixed(1)}s`;
  const ms=document.getElementById('memoryScreen');
  ms.classList.remove('hidden');
  requestAnimationFrame(()=>{
    ms.classList.add('show');
    // Set initial position without animation
    document.getElementById('memoryTrack').style.transition='none';
    goTo(memIdx);
    setTimeout(()=>document.getElementById('memoryTrack').style.transition='transform .35s ease',50);
  });
}

// Swipe on memory screen
(function(){
  let sx=null;
  const ms=document.getElementById('memoryScreen');
  ms.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  ms.addEventListener('touchend',e=>{
    if(sx===null)return;
    const dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>40) goTo(memIdx+(dx<0?1:-1));
    sx=null;
  });
  ms.addEventListener('mousedown',e=>{sx=e.clientX;});
  ms.addEventListener('mouseup',e=>{
    if(sx===null)return;
    const dx=e.clientX-sx;
    if(Math.abs(dx)>40) goTo(memIdx+(dx<0?1:-1));
    sx=null;
  });
})();

document.getElementById('memoryBtn').addEventListener('click',()=>{
  const ms=document.getElementById('memoryScreen');
  ms.classList.remove('show');
  setTimeout(()=>{ms.classList.add('hidden');startGame();},500);
});

// ══════════════════════════════════════════
// START
// ══════════════════════════════════════════
function startGame(){
  document.getElementById('menuScreen').classList.add('hidden');
  Object.assign(G,{state:'running',x:0,scrollY:0,speed:80,elapsed:0,score:0,gates:0,missed:0,level:1,timing:false,lean:0,_prevX:0});
  gates=[];nextGateY=280;
  audioStart();
}
document.getElementById('startBtn').addEventListener('click',()=>{AC();startGame();});

// ══════════════════════════════════════════
// LOOP
// ══════════════════════════════════════════
let last=0;
(function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  ctx.clearRect(0,0,W,H);

  if(G.state==='running'||G.state==='dead'){
    // Clip to game area
    ctx.save();ctx.beginPath();ctx.rect(0,0,W,GAME_H());ctx.clip();
    drawSlopeBackground();
    gates.forEach(drawGate);
    drawSkier();
    drawArrow();
    ctx.restore();
    drawTouchpad();
    updateHUD();
    if(G.state==='running')tick(dt);
  } else {
    // Menu background
    ctx.save();ctx.beginPath();ctx.rect(0,0,W,GAME_H());ctx.clip();
    drawSlopeBackground();
    ctx.restore();
    drawTouchpad();
  }
})();
</script>
