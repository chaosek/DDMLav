<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DDM Lavarone 2026 🎿</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;
  font-family:'Segoe UI',Arial,sans-serif;touch-action:none;
  user-select:none;-webkit-user-select:none;}
canvas{display:block;width:100%;height:100%;}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
#top{position:absolute;top:0;left:0;right:0;display:flex;
  justify-content:space-around;padding:10px 12px;
  background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);}
.stat{text-align:center;}
.sl{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.45);text-transform:uppercase;}
.sv{font-size:22px;font-weight:900;color:#fff;text-shadow:0 0 12px rgba(80,160,255,.6);}
#spbar{position:absolute;bottom:0;left:0;right:0;height:4px;background:rgba(255,255,255,.08);}
#spfill{height:100%;width:0;background:linear-gradient(90deg,#1a4bcc,#00e5ff);}
#steerbar{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  width:160px;height:28px;background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.15);border-radius:14px;overflow:hidden;}
#sknob{position:absolute;top:50%;left:50%;width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#88ccff,#1a4bcc);
  transform:translate(-50%,-50%);box-shadow:0 0 8px #1a4bccaa;}

#fb{position:absolute;top:24%;left:50%;transform:translateX(-50%);
  font-size:28px;font-weight:900;letter-spacing:4px;
  pointer-events:none;opacity:0;white-space:nowrap;}
#fb.pop{animation:pop .85s ease-out forwards;}
@keyframes pop{0%{opacity:1;transform:translateX(-50%) scale(1.3) translateY(0)}
  100%{opacity:0;transform:translateX(-50%) scale(.88) translateY(-28px)}}

#arrow{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);
  font-size:26px;opacity:0;transition:opacity .2s;}
#arrow.on{opacity:1;}

#flash{position:fixed;inset:0;pointer-events:none;z-index:8;opacity:0;}
#flash.g{animation:fg .3s ease-out forwards;}
#flash.r{animation:fr .3s ease-out forwards;}
@keyframes fg{0%{background:rgba(0,255,100,.18);opacity:1}100%{opacity:0}}
@keyframes fr{0%{background:rgba(255,30,50,.22);opacity:1}100%{opacity:0}}

#warn{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);
  font-size:15px;font-weight:900;color:#ffaa00;letter-spacing:2px;
  background:rgba(0,0,0,.6);padding:5px 14px;border-radius:8px;
  border:1px solid #ffaa0055;opacity:0;}
#warn.on{animation:wf 2.2s ease-out forwards;}
@keyframes wf{0%,65%{opacity:1}100%{opacity:0}}

#lvl{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);border:1px solid #ffd84d;border-radius:20px;
  padding:4px 14px;font-size:10px;font-weight:900;letter-spacing:3px;
  color:#ffd84d;opacity:0;transition:opacity .35s;}
#lvl.on{opacity:1;}

/* MENU */
#menu{position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 30%,#071428 0%,#020810 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;overflow-y:auto;}
.mbrand{font-size:10px;letter-spacing:6px;color:rgba(80,140,255,.5);margin-bottom:8px;}
.mtitle{font-size:clamp(42px,12vw,88px);font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,#fff 0%,#88ccff 40%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:.88;margin-bottom:4px;}
.myear{font-size:clamp(14px,4vw,26px);letter-spacing:10px;color:#2a5fff;margin-bottom:28px;}
.nickrow{display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:10px 16px;margin-bottom:18px;}
.nickrow label{font-size:10px;letter-spacing:3px;color:rgba(80,140,255,.7);}
#nick{background:none;border:none;outline:none;color:#fff;
  font-size:18px;font-weight:700;width:160px;text-align:center;font-family:inherit;}
#nick::placeholder{color:rgba(255,255,255,.18);}
.desc{font-size:11px;color:rgba(255,255,255,.3);line-height:2.2;margin-bottom:22px;text-align:center;letter-spacing:.5px;}
#startBtn{padding:14px 48px;border-radius:50px;border:2px solid #2a5fff;
  background:linear-gradient(135deg,rgba(26,75,204,.35),rgba(0,200,255,.1));
  color:#fff;font-size:17px;font-weight:900;letter-spacing:6px;cursor:pointer;
  box-shadow:0 0 28px rgba(26,75,204,.4);transition:all .22s;margin-bottom:20px;}
#startBtn:active{transform:scale(.96);}

/* LEADERBOARD */
.lbtitle{font-size:9px;letter-spacing:4px;color:rgba(80,140,255,.45);margin-bottom:8px;}
.lbrow{display:flex;justify-content:space-between;align-items:center;
  padding:5px 8px;border-radius:6px;font-size:13px;margin-bottom:2px;}
.lbrow:nth-child(1){background:rgba(255,215,0,.08);color:#ffd700;}
.lbrow:nth-child(2){background:rgba(192,192,192,.06);color:#c0c0c0;}
.lbrow:nth-child(3){background:rgba(205,127,50,.06);color:#cd7f32;}
.lbpts{font-weight:900;color:#ffd84d;margin-left:8px;}
.lbtime{font-family:monospace;color:rgba(255,255,255,.35);font-size:11px;margin-left:8px;}

/* RESULT */
#result{position:fixed;inset:0;z-index:90;
  background:rgba(0,0,0,.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;display:none;}
#result.on{display:flex;}
#result h2{font-size:clamp(26px,7vw,52px);font-weight:900;margin-bottom:6px;}
.rfin{color:#22dd88;text-shadow:0 0 30px #22dd8888;}
.rdisq{color:#ff2244;text-shadow:0 0 30px #ff224488;}
.rbig{font-size:clamp(44px,11vw,70px);font-weight:900;color:#ffd84d;
  text-shadow:0 0 30px #ffd84d88;margin:8px 0;}
.rsub{font-size:13px;color:rgba(255,255,255,.45);margin:3px 0;}
#replayBtn{margin-top:18px;padding:13px 42px;border-radius:50px;
  border:2px solid #22dd88;background:transparent;color:#22dd88;
  font-size:16px;font-weight:900;letter-spacing:5px;cursor:pointer;transition:all .2s;}
#replayBtn:active{background:#22dd88;color:#000;}
</style>
</head>

<script>

const LSKEY='ddm26b';

function lbGet(){try{return JSON.parse(localStorage.getItem(LSKEY)||'[]');}catch{return[];}}
function lbAdd(nick,gates,score,time){

];

function photoUrl(id){

// ─── AUDIO ──────────────────────────────────────────────
let ax=null;
function AC(){if(!ax)ax=new(window.AudioContext||window.webkitAudioContext)();if(ax.state==='suspended')ax.resume();return ax;}
let snode=null,sgain=null;
function sndStart(){
  if(snode)return;const a=AC();
  const b=a.createBuffer(1,a.sampleRate*2,a.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
  snode=a.createBufferSource();snode.buffer=b;snode.loop=true;
  const bp=a.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=.8;
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;
  sgain=a.createGain();sgain.gain.value=0;
  snode.connect(bp);bp.connect(lp);lp.connect(sgain);sgain.connect(a.destination);snode.start();
}
function sndStop(){if(!snode)return;try{snode.stop();}catch(e){}snode=null;sgain=null;}
function sndVol(v){if(!sgain||!ax)return;sgain.gain.setTargetAtTime(v*.16,ax.currentTime,.08);}
function sndBeep(ff,amp=.22){const a=AC(),t=a.currentTime;ff.forEach((f,i)=>{const o=a.createOscillator();o.type='sine';o.frequency.value=f;const g=a.createGain();g.gain.setValueAtTime(amp,t+i*.07);g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.55);o.connect(g);g.connect(a.destination);o.start(t+i*.07);o.stop(t+i*.07+.6);});}
function sndCrash(){const a=AC(),t=a.currentTime;const o=a.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(28,t+.9);const g=a.createGain();g.gain.setValueAtTime(.5,t);g.gain.exponentialRampToValueAtTime(.001,t+.95);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+1);}

// ─── THREE.JS ───────────────────────────────────────────
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.12;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(80,1,.15,1200); // wider FOV = more immersive FP

window.addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
renderer.setSize(innerWidth,innerHeight);
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();

// ─── SKY ────────────────────────────────────────────────
// Beautiful gradient sky using ShaderMaterial on a large sphere
{
  const skyGeo=new THREE.SphereGeometry(900,16,8);
  const skyMat=new THREE.ShaderMaterial({
    uniforms:{
      topC:{value:new THREE.Color(0x0d2060)},
      midC:{value:new THREE.Color(0x2255aa)},
      botC:{value:new THREE.Color(0x88bbdd)},
    },
    vertexShader:`varying float h;void main(){h=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`varying float h;uniform vec3 topC,midC,botC;void main(){
      vec3 c=h>0.?mix(midC,topC,h):mix(botC,midC,-h*3.+1.);
      gl_FragColor=vec4(c,1.);}`,
    side:THREE.BackSide,depthWrite:false
  });
  scene.add(new THREE.Mesh(skyGeo,skyMat));
  // Fog matches lower sky
  scene.fog=new THREE.FogExp2(0x88bbdd,.0025);
  scene.background=new THREE.Color(0x88bbdd);
}

// ─── LIGHTS ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xaaccee,1.0));
const sun=new THREE.DirectionalLight(0xfff5e0,2.6);
sun.position.set(100,200,80);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;sun.shadow.camera.far=600;
sun.shadow.camera.left=-120;sun.shadow.camera.right=120;
sun.shadow.camera.top=120;sun.shadow.camera.bottom=-120;
sun.shadow.bias=-.001;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x99ccff,0xddeeff,.75));

// ─── TERRAIN ────────────────────────────────────────────
// Open slope — no valley walls, just a wide tilted snowy field
// Grade 25%, gentle noise only — smooth racing surface

const GRADE=0.25; // 25% slope
const FIELD_W=200; // very wide open field

function noiseH(ix,iz){const v=Math.sin(ix*127.1+iz*311.7)*43758.5;return v-Math.floor(v);}
function cerp(a,b,t){return a+(b-a)*t*t*(3-2*t);}
function snoise(x,z,f){
  const px=x*f,pz=z*f,ix=Math.floor(px),iz=Math.floor(pz),fx=px-ix,fz=pz-iz;
  return(cerp(cerp(noiseH(ix,iz),noiseH(ix+1,iz),fx),cerp(noiseH(ix,iz+1),noiseH(ix+1,iz+1),fx),fz)*2-1);
}
// Pure open slope: grade + very gentle undulations
function groundY(x,z){
  return -z*GRADE
    + snoise(x,z,.007)*3.5   // long gentle rolls
    + snoise(x,z,.02)*.8;    // tiny micro relief
}
function groundNorm(x,z){
  const e=.5,h0=groundY(x,z),hx=groundY(x+e,z),hz=groundY(x,z+e);
  return new THREE.Vector3(-(hx-h0)/e,1,-(hz-h0)/e).normalize();
}

// Road texture — snow field with blue lane lines marking the course
function mkRoadTex(){
  const s=1024, cv=document.createElement('canvas');
  cv.width=s; cv.height=s;
  const c=cv.getContext('2d');

  // Snow base
  const g=c.createLinearGradient(0,0,s,s);
  g.addColorStop(0,'#e4f0ff'); g.addColorStop(1,'#ccdff5');
  c.fillStyle=g; c.fillRect(0,0,s,s);
  // Sparkle
  for(let i=0;i<14000;i++){
    const v=170+Math.floor(Math.random()*84);
    c.fillStyle=`rgba(${v},${v},${Math.min(255,v+28)},.6)`;
    c.beginPath(); c.arc(Math.random()*s,Math.random()*s,Math.random()*1.6,0,Math.PI*2); c.fill();
  }
  // === ROAD / PISTE MARKINGS ===
  // The texture maps to world: U = X direction, V = Z direction
  // Road centre: world X=0 → U = 0.5
  // Road width in world: ~14m each side = 28m total
  // Field width TW=300m → road 28/300 = 9.3% of texture width
  // Lane lines at ±9m → ±9/300 = ±3% from centre

  const cx=s/2; // centre X pixel
  // Road width in pixels: 28/300 * s ≈ 95px each side = 190px total
  const rw=95;

  // Soft road surface — slightly grey/packed snow
  c.fillStyle='rgba(210,225,245,.55)';
  c.fillRect(cx-rw, 0, rw*2, s);

  // Left blue line
  const lb=cx-rw+8;
  const lw=7;
  c.strokeStyle='#1a5fff'; c.lineWidth=lw; c.globalAlpha=.9;
  c.beginPath(); c.moveTo(lb,0); c.lineTo(lb,s); c.stroke();

  // Right blue line
  const rb=cx+rw-8;
  c.beginPath(); c.moveTo(rb,0); c.lineTo(rb,s); c.stroke();

  // Centre dashed white line
  c.strokeStyle='rgba(255,255,255,.5)'; c.lineWidth=3; c.setLineDash([s*.06,s*.04]);
  c.beginPath(); c.moveTo(cx,0); c.lineTo(cx,s); c.stroke();
  c.setLineDash([]);
  c.globalAlpha=1;

  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  // 1 repeat across full terrain width (TW=300m), TL/300 repeats in length
  // But we want road lines at fixed world X positions
  // U=0..1 maps to X=-TW/2..+TW/2

// Semicircle arch gates with TubeGeometry — properly planted in slope
const activeGates=[];
let gNextZ=0;
// Track curve — each gate jumps BIG left/right
// Key insight: step must be large relative to what player can see
// Gate spacing ~55m, player field of view ~60° → gate 25m off-center is VERY visible
let tcX=0,tcDir=1,tcRun=0;
function tcInit(){tcX=0;tcDir=Math.random()>.5?1:-1;tcRun=0;}
function tcNext(diff){
  if(tcRun<=0){
    tcRun=1+Math.floor(Math.random()*3); // 1–3 gates same direction then flip
    tcDir=-tcDir;
  }
  tcRun--;
  // Step: 22–40m lateral. With gate spacing 55m this creates 22–40° apparent turn angle.
  const step=22+diff*1.5+Math.random()*18;
  tcX+=tcDir*step;
  // Clamp to ±42m from centre — wide open slope
  tcX=Math.max(-42,Math.min(42,tcX));
  // Bounce off edges
  if(Math.abs(tcX)>=40){tcDir=-tcDir;tcRun=0;}
  return tcX;
}

function gateCat(diff){
  const r=Math.random();
  const shrink=diff*.18;
  if(r<.25)return{half:Math.max(3.5,4.5+Math.random()*1.2-shrink),pts:3,type:'narrow'};
  if(r<.55)return{half:Math.max(6,7+Math.random()*1.8-shrink),pts:2,type:'medium'};
  return     {half:Math.max(8,9+Math.random()*2.4-shrink),pts:1,type:'wide'};
}
function gateCol(cat,idx){
  if(cat.type==='narrow')return 0xcc00ff;
  if(cat.type==='medium')return 0xff5500;
  return idx%2===0?0xff0022:0x0044ff;
}

function buildGate(wz,diff){
  const gx=tcNext(diff);
  const cat=gateCat(diff);
  const col=gateCol(cat,activeGates.length);

  const mat=new THREE.MeshStandardMaterial({
    color:col,roughness:.38,metalness:.2,
    emissive:new THREE.Color(col),emissiveIntensity:.3,
    side:THREE.DoubleSide
  });
  const poleMat=new THREE.MeshStandardMaterial({color:col,roughness:.5,emissive:new THREE.Color(col),emissiveIntensity:.15});

  const lx=gx-cat.half,rx=gx+cat.half;
  const ly=groundY(lx,wz),ry=groundY(rx,wz);
  const baseY=(ly+ry)*.5;
  const POLE_H=4.8;
  const meshes=[];

  // Ground poles
  for(const [px,gy] of[[lx,ly],[rx,ry]]){
    const ph=POLE_H+.5;
    const p=new THREE.Mesh(new THREE.CylinderGeometry(.13,.13,ph,8),poleMat);
    p.position.set(px,gy+ph*.5,wz);p.castShadow=true;scene.add(p);meshes.push(p);
    // Ground disc
    const d=new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,.1,12),
      new THREE.MeshLambertMaterial({color:0xaabbcc}));
    d.position.set(px,gy+.05,wz);scene.add(d);meshes.push(d);
  }

  // Semicircle arch as TubeGeometry along a CatmullRomCurve3
  const pts=[];
  const SEGS=20;
  for(let i=0;i<=SEGS;i++){
    const a=Math.PI*i/SEGS; // 0..PI
    pts.push(new THREE.Vector3(
      gx + Math.cos(Math.PI-a)*cat.half,
      baseY + POLE_H + Math.sin(a)*cat.half,
      wz
    ));
  }
  const curve=new THREE.CatmullRomCurve3(pts);
  const archGeo=new THREE.TubeGeometry(curve,32,.28,8,false);
  const arch=new THREE.Mesh(archGeo,mat);
  arch.castShadow=true;scene.add(arch);meshes.push(arch);

  activeGates.push({z:wz,x:gx,half:cat.half,pts:cat.pts,passed:false,meshes,mat,col});
}
function removeGate(g){g.meshes.forEach(m=>{if(m.geometry)m.geometry.dispose();scene.remove(m);});}

    add(new THREE.CylinderGeometry(.08,.07,.34,8),sM,ag,xo<0?-.14:.14,-.32,.23,.62,0,xo<0?.27:-.27);
    add(new THREE.SphereGeometry(.115,8,7),gvM,ag,xo<0?-.22:.22,-.49,.34);
    add(new THREE.CylinderGeometry(.024,.02,1.2,6),pM,ag,xo<0?-.24:.24,-.57,.42,.72,0,xo<0?.21:-.21);
  }

  // Legs
  for(const lg of[legL,legR]){
    add(new THREE.CylinderGeometry(.13,.11,.42,8),s2,lg,0,.38,.07,.13);
    add(new THREE.CylinderGeometry(.11,.13,.38,8),new THREE.MeshStandardMaterial({color:0x1a1a44,roughness:.68}),lg,0,.13,.1,.09);
    add(new THREE.BoxGeometry(.22,.26,.36),bM,lg,0,.06,.09);
    for(let b=0;b<3;b++)add(new THREE.BoxGeometry(.24,.04,.1),new THREE.MeshStandardMaterial({color:0x888,metalness:.8}),lg,0,.13+b*.07,.16);
  }

  // Skis
  for(const [sm,sx] of[[sRM,-.14],[sBM,.14]]){
    const sg=new THREE.Group();sg.position.x=sx;skierMdl.add(sg);
    add(new THREE.BoxGeometry(.09,.05,2.1),sm,sg,0,.02,.08);
    add(new THREE.BoxGeometry(.09,.08,.32),sm,sg,0,.07,.9,-.38);
    add(new THREE.BoxGeometry(.09,.06,.17),sm,sg,0,.06,-.9,.22);
    add(new THREE.BoxGeometry(.17,.08,.28),biM,sg,0,.065,.1);
    add(new THREE.BoxGeometry(.095,.028,1.96),new THREE.MeshStandardMaterial({color:0x999,roughness:.2,metalness:.9}),sg,0,-.007,.08);
  }
})();

// ─── GAME STATE ─────────────────────────────────────────
const G={
  state:'menu',
  x:0,z:0,y:0,spd:0,steer:0,lean:0,
  inAir:false,airVY:0,
  elapsed:0,score:0,gates:0,diff:0,
  timing:false,legT:0,
  camX:0,camY:0,camZ:0,camOK:false,
  camLookX:0,lastDiff:-1,
};
function maxSpd(){return 22+G.diff*2.0;}
function gateSpacing(){return 42+G.diff*5;}  // shorter = turns feel tighter
function obstSpacing(){return Math.max(48,92-G.diff*4);}
function obstChance(){return Math.min(.8,.28+G.diff*.06);}

// ─── INPUT ──────────────────────────────────────────────
let t0=null,tX=null,mdrag=false,mX=0;
canvas.addEventListener('touchstart',e=>{if(G.state!=='running')return;t0=tX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchmove', e=>{if(G.state!=='running')return;tX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchend',  ()=>{t0=tX=null;});
canvas.addEventListener('mousedown', e=>{if(G.state!=='running')return;mdrag=true;mX=e.clientX;});
window.addEventListener('mousemove', e=>{if(!mdrag||G.state!=='running')return;G.steer=Math.max(-1,Math.min(1,(e.clientX-mX)/44));});
window.addEventListener('mouseup',   ()=>mdrag=false);
const keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',  e=>keys[e.key]=false);

// ─── CAMERA — First Person (Gran Turismo / Forza style) ─────
// Camera sits exactly at skier's head. Rotation comes from:
//   1. Slope pitch  — terrain ahead vs behind (smooth)
//   2. Lean roll    — slight roll when turning (immersive)
//   3. Look-ahead   — gently rotates toward next gate (subtle)
// No lookAt(), no jumping. Pure quaternion composition.

let fpPitch=0, fpYaw=0, fpRoll=0; // smooth camera angles

function camTick(dt){
  // Head position: skier world pos + 1.75m up
  camera.position.set(G.x, G.y+1.75, G.z);

  // ── Pitch: follow slope angle ──────────────────────────
  const hNow  = groundY(G.x, G.z);
  const hAhead= groundY(G.x, G.z-4);
  const slopePitch = Math.atan2(hNow-hAhead, 4); // positive = going downhill
  const targetPitch = -0.08 - slopePitch*0.5;    // tilt forward down slope
  fpPitch += (targetPitch - fpPitch) * Math.min(1, dt*6);

  // ── Yaw: look toward next gate — VERY subtle ──────────
  const ng = activeGates.find(g=>!g.passed);
  let targetYaw = 0;
  if(ng && ng.z-G.z > -160 && ng.z < G.z+2){
    const dx = ng.x - G.x;
    const dz = Math.abs(ng.z - G.z) + 0.01;
    // Max ±12° look-ahead so player knows where to go
    targetYaw = Math.max(-0.20, Math.min(0.20, Math.atan2(dx, dz) * 0.35));
  }
  fpYaw += (targetYaw - fpYaw) * Math.min(1, dt*5);

  // ── Roll: lean into turns like a real skier ────────────
  const targetRoll = -G.steer * 0.06; // slight tilt into turn
  fpRoll += (targetRoll - fpRoll) * Math.min(1, dt*8);

  // ── Compose rotation: YXZ order (yaw, pitch, roll) ────
  // This avoids gimbal lock and feels natural for a first-person skier
  camera.rotation.order = 'YXZ';
  camera.rotation.y = fpYaw;
  camera.rotation.x = fpPitch;
  camera.rotation.z = fpRoll;
}

// Hide skier body in first person
skierRoot.visible = false;

// Ski tips visible in FP — like car hood in Gran Turismo
// Two ski tips poking into view at bottom of screen
const fpSkiGroup = new THREE.Group();
camera.add(fpSkiGroup); // attached to camera so always in view
scene.add(camera);      // camera must be in scene for children to render

const skiTipMatR = new THREE.MeshStandardMaterial({color:0xff1000,roughness:.3,metalness:.4});
const skiTipMatL = new THREE.MeshStandardMaterial({color:0x1044ff,roughness:.3,metalness:.4});
for(const [mat,sx] of [[skiTipMatL,-.18],[skiTipMatR,.18]]){
  const g=new THREE.Group();
  // Main ski body visible from above
  const ski=new THREE.Mesh(new THREE.BoxGeometry(.09,.04,1.4),mat);
  ski.position.set(0,0,.4);
  g.add(ski);
  // Curved tip
  const tip=new THREE.Mesh(new THREE.BoxGeometry(.09,.07,.28),mat);
  tip.position.set(0,.035,-.33);tip.rotation.x=-.4;
  g.add(tip);
  g.position.set(sx,-.85,.2); // hang below camera, slightly forward
  g.rotation.x=.18; // tilt forward like ski angle
  fpSkiGroup.add(g);
}

// Update ski tip lean based on steer
function updateFPSkis(){
  fpSkiGroup.rotation.z = -G.steer * 0.08; // lean with turns
  fpSkiGroup.rotation.x = 0.18 + fpPitch * 0.3; // follow slope
}

// ─── HUD ────────────────────────────────────────────────
const hT=document.getElementById('hT'),hG=document.getElementById('hG'),
      hS=document.getElementById('hS'),hV=document.getElementById('hV'),
      spfill=document.getElementById('spfill'),sknob=document.getElementById('sknob'),
      fbEl=document.getElementById('fb'),arrowEl=document.getElementById('arrow'),
      flashEl=document.getElementById('flash'),warnEl=document.getElementById('warn'),
      lvlEl=document.getElementById('lvl');
let fbTmr=null;

function doFlash(t){flashEl.className='';void flashEl.offsetWidth;flashEl.className=t;}
function showFB(txt,col){
  fbEl.textContent=txt;fbEl.style.color=col;
  fbEl.className='';void fbEl.offsetWidth;fbEl.className='pop';
  if(fbTmr)clearTimeout(fbTmr);
  fbTmr=setTimeout(()=>fbEl.className='',900);
}
function showWarn(n){
  warnEl.textContent=`⚠ ${n}`;
  warnEl.className='';void warnEl.offsetWidth;warnEl.className='on';
}
const LVL_N=['ROZJEZD 🏁','ZÁVODNÍK ⚡','EXPERT 🔥','ŠAMPION 💥','LEGENDA 🌪️'];
function checkLvl(){
  const f=Math.floor(G.diff);
  if(f!==G.lastDiff&&f>0){
    G.lastDiff=f;
    lvlEl.textContent=`▲ LEVEL ${f}  ${LVL_N[Math.min(4,f-1)]}`;
    lvlEl.classList.add('on');setTimeout(()=>lvlEl.classList.remove('on'),2400);
  }
}
function hudTick(){
  hT.textContent=G.elapsed.toFixed(2);
  hG.textContent=G.gates;
  hS.textContent=G.score;
  hV.textContent=Math.round(G.spd*3.6*2.4);
  spfill.style.width=(G.spd/maxSpd()*100)+'%';
  sknob.style.left=(50+G.steer*44)+'%';
  const ng=activeGates.find(g=>!g.passed);
  if(ng){
    const dx=ng.x-G.x;
    if(Math.abs(dx)>9){
      arrowEl.className='on';
      arrowEl.textContent=dx>0?'↗':'↖';
    } else arrowEl.className='';
  } else arrowEl.className='';
}

// ─── TICK ───────────────────────────────────────────────
function tick(dt){
  // Input
  if(t0!==null&&tX!==null) G.steer=Math.max(-1,Math.min(1,(tX-t0)/42));
  else if(!mdrag){
    if(keys['ArrowLeft']||keys['a'])G.steer=-1;
    else if(keys['ArrowRight']||keys['d'])G.steer=1;
    else G.steer=0;
  }

  const ms=maxSpd();
  G.spd+=((13+G.diff*.55)*dt);
  G.spd-=Math.abs(G.steer)*.055*G.spd*dt;
  G.spd=Math.max(0,Math.min(ms,G.spd));

  G.x+=G.steer*22*dt;
  // No hard walls on open slope — but gentle soft limit far out
  G.x=Math.max(-70,Math.min(70,G.x));
  G.z-=G.spd*dt;

  const gy=groundY(G.x,G.z);
  if(G.inAir){
    G.airVY-=22*dt;G.y+=G.airVY*dt;
    if(G.y<=gy){G.y=gy;G.inAir=false;G.airVY=0;}
  } else {
    G.y=gy;
    const fy=groundY(G.x,G.z-1.5);
    if(gy-fy>G.spd*dt*.4&&G.spd>5){G.inAir=true;G.airVY=Math.min((gy-fy)/dt*.36,6);sndBeep([280,180],.07);}
  }

  sndVol(G.spd/ms);
  if(!G.timing&&G.z<-8)G.timing=true;
  if(G.timing)G.elapsed+=dt;
  G.diff=Math.min(12,G.gates/5);
  checkLvl();

  // Skier pose
  const norm=groundNorm(G.x,G.z);
  const upQ=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),norm);
  const yQ=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),-G.steer*.5);
  G.lean+=(G.steer*.38-G.lean)*Math.min(1,dt*10);
  const lQ=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1),G.lean);
  skierRoot.position.set(G.x,G.y,G.z);
  skierRoot.quaternion.copy(upQ).multiply(yQ).multiply(lQ);
  skierMdl.rotation.x=-Math.min(.36,G.spd/ms*.32+(G.inAir?.15:0));
  G.legT+=G.spd*dt*1.4;
  const pump=Math.sin(G.legT)*.08*(G.inAir?.15:1);
  legL.rotation.x=pump;legR.rotation.x=-pump;

  sun.position.set(G.x+90,200,G.z+70);

  // World
  updateTerrain(G.z);
  updateSnow(G.z,dt);
  // Trees left side only
  // (re-use existing tree pool from previous version — skip here for clean rewrite)
  updateBBs(G.z);

  // Spawn gates
  while(gNextZ>G.z-220){gNextZ-=gateSpacing();buildGate(gNextZ,G.diff);}
  for(let i=activeGates.length-1;i>=0;i--)
    if(activeGates[i].z>G.z+65){removeGate(activeGates[i]);activeGates.splice(i,1);}

  // Spawn obstacles
  while(oNextZ>G.z-200){
    oNextZ-=obstSpacing()+Math.random()*28;
    if(Math.random()<obstChance()){
      const def=OBSTDEFS[Math.floor(Math.random()*OBSTDEFS.length)];
      activeObst.push(buildObst(def,oNextZ,G.diff));
    }
  }
  for(let i=activeObst.length-1;i>=0;i--)
    if(activeObst[i].group.position.z>G.z+90){removeObst(activeObst[i]);activeObst.splice(i,1);}

  // Animate obstacles
  for(const ob of activeObst){
    ob.animT+=dt;
    if(ob.speedX!==0){
      ob.wx+=ob.speedX*dt;
      ob.group.position.x=ob.wx;
      ob.group.position.y=groundY(ob.wx,ob.wz);
      if(ob.def.id==='police') ob.group.rotation.y=ob.speedX>0?-Math.PI/2:Math.PI/2;
      if(ob.def.id==='heli')   ob.group.rotation.y=ob.speedX>0?-Math.PI/2:Math.PI/2;
      if(Math.abs(ob.wx)>60){ob.speedX=-ob.speedX;}
    }
    // Spin helicopter rotor
    if(ob.def.id==='heli'&&ob.rotorMesh) ob.rotorMesh.rotation.y+=dt*12;
    // Helicopter hover
    if(ob.def.id==='heli') ob.group.position.y=groundY(0,ob.wz)+18+Math.sin(ob.animT*.8)*1.5;

    // Collision (skip heli)
    if(ob.def.hw===0||ob.hit)continue;
    const dx=Math.abs(G.x-ob.group.position.x);
    const dz=Math.abs(G.z-ob.wz);
    if(dx<ob.def.hw*.7&&dz<2.5){ob.hit=true;die(`Srazil jsi ${ob.def.name}!`);return;}
    if(!ob.warned&&dz<32&&dz>5&&dx<40){ob.warned=true;showWarn(ob.def.name);}
  }

  // Gate check
  for(const g of activeGates){
    if(g.passed)continue;
    if(G.z<g.z-2){
      if(G.x>g.x-g.half&&G.x<g.x+g.half){
        g.passed=true;G.gates++;G.score+=g.pts;
        doFlash('g');
        const c=Math.abs(G.x-g.x)/g.half;
        let txt,col,bonus=0;
        if(c<.18){txt=`PERFECT! +${g.pts+1}✨`;col='#00eeff';bonus=1;}
        else if(c<.55){txt=`GOOD +${g.pts}✓`;col='#ffdd00';}
        else{txt=`OK  +${g.pts}`;col='#88ff88';}
        G.score+=bonus;
        showFB(txt,col);
        sndBeep(c<.18?[1046,1318,1568]:[880,1100]);
        // Flash gate white briefly
        if(g.mat){const oh=g.mat.color.getHex();g.mat.color.set(0xffffff);g.mat.emissive.set(0xffffff);setTimeout(()=>{g.mat.color.set(oh);g.mat.emissive.set(g.col).multiplyScalar(.3);},200);}
      } else {
        die('Vynechal jsi branku! 🚩');return;
      }
    }
  }

  camTick(dt);
  updateFPSkis();
  hudTick();
}

// ─── DEATH ──────────────────────────────────────────────
function die(reason){
  if(G.state==='dead')return;
  G.state='dead';G.timing=false;
  sndStop();sndCrash();
  doFlash('r');
  const nick=playerNick||'Závodník';
  if(G.gates>0)lbAdd(nick,G.gates,G.score,G.elapsed);
  setTimeout(()=>{
    document.getElementById('rTitle').textContent=G.gates>0?'🏁 VÝSLEDEK':'💥 KONEC';
    document.getElementById('rTitle').className=G.gates>5?'rfin':'rdisq';
    document.getElementById('rReason').textContent=reason;
    document.getElementById('rScore').textContent=`${G.score} bodů`;
    document.getElementById('rGates').textContent=`Prošel jsi ${G.gates} branek`;
    document.getElementById('rTime').textContent=`Čas: ${G.elapsed.toFixed(2)}s`;
    lbRender('lbResult');
    document.getElementById('result').classList.add('on');
  },1500);
}

// ─── START ──────────────────────────────────────────────
function startGame(){
  document.getElementById('menu').style.display='none';
  document.getElementById('result').classList.remove('on');
  [...activeGates].forEach(removeGate);activeGates.length=0;
  [...activeObst].forEach(removeObst);activeObst.length=0;

  Object.assign(G,{
    state:'running',x:0,z:0,y:groundY(0,0),
    spd:15,steer:0,lean:0,inAir:false,airVY:0,
    elapsed:0,score:0,gates:0,diff:0,
    timing:false,legT:0,camOK:false,lastDiff:-1,camLookX:0,
  });
  fpPitch=0;fpYaw=0;fpRoll=0;
  gNextZ=-25;oNextZ=-65;bbDone=false;bbNextZ=0;pidx=0;
  terrZ=null;
  tcInit();
  sndStart();
}

document.getElementById('startBtn').addEventListener('click',()=>{AC();startGame();});
document.getElementById('replayBtn').addEventListener('click',()=>startGame());

// ─── RENDER LOOP ────────────────────────────────────────
let last=0;
(function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  if(G.state==='running') tick(dt);
  else {
    // Menu/idle orbit
    const t=ts*.00011;
    camera.position.set(Math.sin(t)*25,14+Math.sin(t*.3)*2,Math.cos(t)*25+5);
    camera.lookAt(0,4,0);
    updateTerrain(0);
  }
  renderer.render(scene,camera);
})();
</script>
